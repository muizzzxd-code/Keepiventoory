name: Build KeepInventory Mod

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle 8.8
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.8'

      - name: Build mod
        run: gradle build
        working-directory: .

      - name: Upload JAR hasil build
        uses: actions/upload-artifact@v4
        with:
          name: keepinventory-mod
          path: build/libs/keepinventory-*.jar
          if-no-files-found: error
